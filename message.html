<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>留言板</title>
<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="MOSE" />
<link rel="manifest" href="/site.webmanifest" />
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f8f9fc}
.logo-fixed{position:fixed;top:16px;left:20px;z-index:999}
.logo-fixed img{height:50px;border-radius:8px}
.nav{background:#fff;padding:22px 0;text-align:center;box-shadow:0 2px 10px #00000007;position:sticky;top:0}
.nav a{margin:0 14px;font-size:16px;color:#222;text-decoration:none;padding:8px 10px}
.nav a.active{color:#007bff;font-weight:600}
.wrap{max-width:800px;margin:40px auto;padding:0 20px}
.write{background:#fff;border-radius:16px;padding:24px;margin-bottom:20px}
textarea{width:100%;height:120px;padding:14px;border:1px solid #ddd;border-radius:12px;margin-bottom:12px}
button{padding:12px 24px;background:#007bff;color:white;border:none;border-radius:12px}
.msg{background:#fff;border-radius:16px;padding:20px;margin-bottom:12px}
.msg .time{font-size:12px;color:#666;margin-top:8px}
.footer{background:#fff;border-top:1px solid #eee;padding:40px 20px;margin-top:60px}
</style>
</head>
<body>
<div class="logo-fixed"><img src="logo.png"></div>
<div class="nav">
<a href="main.html">首页</a>
<a href="read.html">阅读</a>
<a href="login.html">投稿</a>
<a href="message.html" class="active">留言</a>
</div>
<div class="wrap">
<div class="write">
<textarea id="msg" placeholder="说点什么…"></textarea>
<button onclick="post()">发布留言</button>
</div>
<div id="box"></div>
</div>
<div class="footer"></div>
<script>
function load(){
let arr=JSON.parse(localStorage.getItem('msg')||'[]')
let h=''
arr.reverse().forEach(i=>{h+=`<div class="msg"><div>${i.t}</div><div class="time">${i.d}</div></div>`})
document.getElementById('box').innerHTML=h
}
function post(){
let t=document.getElementById('msg').value
if(!t)return
let arr=JSON.parse(localStorage.getItem('msg')||'[]')
arr.push({t,t,d:new Date().toLocaleString()})
localStorage.setItem('msg',JSON.stringify(arr))
document.getElementById('msg').value=''
load()
}
load()
</script>
</body>
</html>
