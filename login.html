<!DOCTYPE html>

<head>

<title>登录 - 水二杂记｜MOSE</title>
<!-- 引入 Supabase 客户端 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:linear-gradient(135deg,#f8f9fc,#e2eafc);display:grid;place-items:center;height:100vh;padding:20px 20px 280px}
.box{background:#fff;width:100%;max-width:400px;padding:36px;border-radius:20px;box-shadow:0 10px 30px #00000010}
h2{text-align:center;margin-bottom:24px}
input{width:100%;padding:14px;margin-bottom:16px;border:1px solid #ddd;border-radius:12px}
button{width:100%;padding:14px;background:#007bff;color:white;border:none;border-radius:12px;font-weight:600}
.link{text-align:center;margin-top:12px;font-size:14px;color:#666}
a{color:#007bff;text-decoration:none}
.footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:20px;text-align:center}
.footer p{font-size:14px;margin:4px 0}
.qrcodes{display:flex;gap:10px;justify-content:center;margin-top:10px}
.qrcodes img{width:70px;height:70px;border-radius:6px}
</style>
</head>
<body>

<div class="box">
<h2>登录</h2>
<input id="email" placeholder="邮箱" type="email">
<input id="password" type="password" placeholder="密码">
<button onclick="login()">登录</button>
<div class="link"><a href="find.html">找回密码</a></div>
<div class="link"><a href="register.html">注册账号</a></div>
<div class="link" style="margin-top:20px"><a href="main.html">返回首页</a></div>
</div>

<div class="footer">
<p>读者联盟QQ频道：MOSE20230927</p>
<p>投稿人联盟QQ群：1054707527</p>
<p>官微：gh_1ece4d40dedf</p>
<p>邮箱：pigli@mose.cc.cd</p>
<div class="qrcodes">
<img src="qrcode1.png"><img src="qrcode2.png"><img src="qrcode3.png">
</div>
</div>

<script>
// ==================== 初始化 Supabase（用你的密钥） ====================
const SUPABASE_URL = 'https://urecpftjcruwfcdwrcyj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_yLWqUQuZbmcsUwE5hwTv2A_wGe1mU0_';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== 登录函数 ====================
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    alert('请输入邮箱和密码');
    return;
  }

  // 调用 Supabase 登录
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email,
    password: password
  });

  if (error) {
    alert('登录失败：' + error.message);
    return;
  }

  // 登录成功！保存用户名到本地（方便投稿页面显示）
  // 同时获取 profiles 表中的用户名
  const userId = data.user.id;
  const { data: profile } = await supabase
    .from('profiles')
    .select('username')
    .eq('id', userId)
    .single();

  const username = profile?.username || email.split('@')[0];
  localStorage.setItem('sb_user_id', userId);
  localStorage.setItem('sb_username', username);
  localStorage.setItem('sb_email', email);

  alert('登录成功！');
  location.href = 'submit.html';  // 登录后跳转到投稿页
}
</script>
</body>
