<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 水二杂记｜MOSE</title>
    <!-- 稳定版 Supabase CDN（和注册页保持一致） -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h2 {
            margin-bottom: 25px;
            color: #333;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-btn:hover {
            background: #337ecc;
        }
        .link-group {
            margin-top: 15px;
        }
        .link-group a {
            display: block;
            color: #409eff;
            text-decoration: none;
            margin: 8px 0;
            font-size: 14px;
        }
        .link-group a:hover {
            text-decoration: underline;
        }
        .footer-info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: #666;
            text-align: left;
        }
    </style>
</head>
<body>
    <!-- 登录表单 -->
    <div class="login-box">
        <h2>登录</h2>
        <input id="email" type="email" placeholder="邮箱">
        <input id="password" type="password" placeholder="密码">
        <button class="login-btn" id="loginBtn">登录</button>
        <div class="link-group">
            <a href="forgot-password.html">找回密码</a>
            <a href="register.html">注册账号</a>
            <a href="main.html">返回首页</a>
        </div>
    </div>

    <!-- 底部信息 -->
    <div class="footer-info">
        读者联盟QQ频道：MOSE20230927<br>
        投稿人联盟QQ群：1054707527<br>
        官微：gh_1ece4d40dedf<br>
        邮箱：pigli@mose.cc.cd
    </div>

<script>
// ==================== Supabase 配置（只声明一次，避免重复） ====================
const SUPABASE_URL = 'https://urecpftjcruwfcdwrcyj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_yLWqUQuZbmcsUwE5hwTv2A_wGe1mU0_';

// 检查 SDK 加载
if (!window.supabase) {
    alert('Supabase 加载失败，请检查网络！');
}

// 只创建一次客户端实例（核心：避免重复声明 supabase 变量）
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== 登录函数 ====================
async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    // 非空校验
    if (!email || !password) {
        alert('请填写邮箱和密码！');
        return;
    }

    try {
        // 调用 Supabase 登录接口
        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password
        });

        if (error) throw error;

        // 登录成功：跳转到首页
        alert('登录成功！');
        location.href = 'main.html';

    } catch (err) {
        // 登录失败：提示具体原因
        let errorMsg = '登录失败：';
        if (err.message.includes('Invalid login credentials')) {
            errorMsg += '邮箱或密码错误';
        } else if (err.message.includes('Email not confirmed')) {
            errorMsg += '邮箱未验证，请先去邮箱激活账号';
        } else {
            errorMsg += err.message;
        }
        alert(errorMsg);
        console.error('登录错误详情：', err);
    }
}

// 绑定登录按钮点击事件
document.getElementById('loginBtn').addEventListener('click', doLogin);

// 支持按回车登录（优化体验）
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        doLogin();
    }
});
</script>
</body>
</html>
