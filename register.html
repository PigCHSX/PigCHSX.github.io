<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>注册 - 水二杂记｜MOSE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:linear-gradient(135deg,#f8f9fc,#e2eafc);padding:20px 20px 280px;max-width:400px;margin:0 auto}
.box{background:#fff;padding:30px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.08);margin-top:20px}
h2{text-align:center;margin-bottom:24px;color:#222}
input{width:100%;padding:14px;margin-bottom:14px;border:1px solid #ddd;border-radius:12px;font-size:15px}
button{width:100%;padding:14px;background:#007bff;color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
.link{text-align:center;margin-top:12px;font-size:14px}
.link a{color:#007bff;text-decoration:none}
.tips-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;z-index:9999}
.tips-content{background:#fff;padding:24px;border-radius:16px;max-width:350px;width:90%}
.tips-content h3{color:#007bff;margin-bottom:12px;text-align:center}
.tips-content p{font-size:14px;line-height:1.6;color:#333;margin-bottom:8px}
.tips-close{width:100%;margin-top:16px;padding:10px;background:#007bff;color:#fff;border:none;border-radius:8px;cursor:pointer}
.footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:20px;text-align:center}
.footer p{font-size:13px;margin:4px 0;color:#333}
.qrcodes{display:flex;gap:8px;justify-content:center;margin-top:10px}
.qrcodes img{width:65px;height:65px;border-radius:6px}
</style>
</head>
<body>

<div class="tips-modal" id="accountTips">
  <div class="tips-content">
    <h3>账号使用说明</h3>
    <p>现在账号已升级为云端存储！您可以在任何设备上使用邮箱+密码登录，投稿记录也将同步（后续会开发）。</p>
    <p>注意：注册后请前往邮箱点击验证链接，否则无法登录。</p>
    <button class="tips-close" onclick="document.getElementById('accountTips').style.display='none'">我知道了</button>
  </div>
</div>

<div class="box">
  <h2>账号注册</h2>
  <input id="username" placeholder="设置用户名" type="text">
  <input id="email" placeholder="邮箱" type="email">
  <input id="password" placeholder="设置密码" type="password">
  <button onclick="doRegister()">完成注册</button>
  <div class="link">
    <a href="login.html">返回登录</a> | <a href="main.html">返回首页</a>
  </div>
</div>

<div class="footer">
  <p>读者联盟QQ频道：MOSE20230927</p>
  <p>投稿人联盟QQ群：1054707527</p>
  <p>官微：gh_1ece4d40dedf</p>
  <p>邮箱：pigli@mose.cc.cd</p>
  <div class="qrcodes">
    <img src="qrcode1.png"><img src="qrcode2.png"><img src="qrcode3.png">
  </div>
</div>

<script>
// 初始化 Supabase
const SUPABASE_URL = 'https://urecpftjcruwfcdwrcyj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_yLWqUQuZbmcsUwE5hwTv2A_wGe1mU0_';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

window.onload = function() {
  document.getElementById('accountTips').style.display = 'flex';
};

// ==================== 注册函数 ====================
async function doRegister() {
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!username || !email || !password) {
    alert('请填写完整信息！');
    return;
  }

  // 调用 Supabase 注册，并把用户名存入 user_metadata
  const { data, error } = await supabase.auth.signUp({
    email: email,
    password: password,
    options: {
      data: {
        username: username   // 触发器会自动将此用户名写入 profiles 表
      }
    }
  });

  if (error) {
    alert('注册失败：' + error.message);
    return;
  }

  alert('注册成功！请前往邮箱查收验证邮件，点击链接激活账号后再登录。');
  location.href = 'login.html';
}
</script>
</body>
</html>
