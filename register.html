<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>注册 - 水二杂记｜MOSE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{
    background:linear-gradient(135deg,#f8f9fc,#e2eafc);
    padding:20px 20px 280px;
    max-width:400px;
    margin:0 auto;
}
.box{
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    margin-top:20px;
}
h2{
    text-align:center;
    margin-bottom:24px;
    color:#222;
}
input{
    width:100%;
    padding:14px;
    margin-bottom:14px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
}
.code-row{
    display:flex;
    gap:10px;
    margin-bottom:14px;
}
.code-row input{flex:1}
button{
    width:100%;
    padding:14px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}
button:disabled{
    background:#999!important;
    cursor:not-allowed;
}
.code-btn{
    width:120px!important;
    white-space:nowrap;
}
.link{
    text-align:center;
    margin-top:12px;
    font-size:14px;
}
.link a{
    color:#007bff;
    text-decoration:none;
}

/* 账号说明弹窗样式 */
.tips-modal{
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.5);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
.tips-content{
    background:#fff;
    padding:24px;
    border-radius:16px;
    max-width:350px;
    width:90%;
}
.tips-content h3{
    color:#007bff;
    margin-bottom:12px;
    text-align:center;
}
.tips-content p{
    font-size:14px;
    line-height:1.6;
    color:#333;
    margin-bottom:8px;
}
.tips-close{
    width:100%;
    margin-top:16px;
    padding:10px;
    background:#007bff;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* 底部信息 */
.footer{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#fff;
    border-top:1px solid #eee;
    padding:20px;
    text-align:center;
}
.footer p{
    font-size:13px;
    margin:4px 0;
    color:#333;
}
.qrcodes{
    display:flex;
    gap:8px;
    justify-content:center;
    margin-top:10px;
}
.qrcodes img{
    width:65px;
    height:65px;
    border-radius:6px;
}
</style>
</head>

<body>

<!-- 账号说明弹窗 -->
<div class="tips-modal" id="accountTips">
    <div class="tips-content">
        <h3>账号使用说明</h3>
        <p>此账号仅供本设备、本浏览器使用，如更换设备或浏览器将需要重新注册账号（原账号在原设备原浏览器仍可用，投稿记录将相互独立），所以作者建议大家尽量只使用同个设备的同个浏览器进行投稿和留言哦～</p>
        <button class="tips-close" onclick="document.getElementById('accountTips').style.display='none'">我知道了</button>
    </div>
</div>

<div class="box">
    <h2>账号注册</h2>
    <input id="username" placeholder="设置用户名" type="text">
    <input id="email" placeholder="邮箱（用于收验证码）" type="email">

    <div class="code-row">
        <input id="code" placeholder="输入验证码" type="text">
        <button class="code-btn" id="codeBtn" onclick="sendCode()">获取验证码</button>
    </div>

    <input id="pwd" placeholder="设置密码" type="password">
    <button onclick="doRegister()">完成注册</button>

    <div class="link">
        <a href="login.html">返回登录</a> | <a href="main.html">返回首页</a>
    </div>
</div>

<!-- 底部信息（已补齐） -->
<div class="footer">
    <p>读者联盟QQ频道：MOSE2030927</p>
    <p>投稿人联盟QQ群：1054707527</p>
    <p>官微：gh_1ece4d40dedf</p>
    <p>邮箱：pigli@mose.cc.cd</p>
    <div class="qrcodes">
        <img src="qrcode1.png">
        <img src="qrcode2.png">
        <img src="qrcode3.png">
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
// 页面加载时自动显示说明弹窗
window.onload = function() {
    document.getElementById('accountTips').style.display = 'flex';
};

// 初始化 EmailJS（你自己的密钥）
emailjs.init("uahvFOAFb1xRmqK6F");

let realCode = "";
let countdown = 0;
let timer;

// ======================
// 发送验证码（带倒计时）
// ======================
function sendCode() {
    if (countdown > 0) return;

    let email = document.getElementById("email").value;
    if (!email) {
        alert("请先输入邮箱！");
        return;
    }

    // 生成6位验证码
    realCode = Math.floor(100000 + Math.random() * 900000) + "";

    // 发送到邮箱
    emailjs.send("service_o9y08vb", "template_116vh8i", {
        email: email,
        code: realCode
    }).then(() => {
        alert("验证码已发送到你的邮箱！");
        startCountdown(); // 开始倒计时
    });
}

// ======================
// 60秒倒计时（你要的功能！）
// ======================
function startCountdown() {
    countdown = 60;
    let btn = document.getElementById("codeBtn");
    btn.disabled = true;
    btn.innerText = `重新发送(${countdown}s)`;

    timer = setInterval(() => {
        countdown--;
        btn.innerText = `重新发送(${countdown}s)`;
        if (countdown <= 0) {
            clearInterval(timer);
            btn.innerText = "获取验证码";
            btn.disabled = false;
        }
    }, 1000);
}

// ======================
// 注册（修复可登录）
// ======================
function doRegister() {
    let user = document.getElementById("username").value;
    let email = document.getElementById("email").value;
    let code = document.getElementById("code").value;
    let pwd = document.getElementById("pwd").value;

    if (!user || !email || !code || !pwd) {
        alert("请填写完整信息！");
        return;
    }
    if (code !== realCode) {
        alert("验证码不正确！");
        return;
    }
    if (localStorage.getItem("user_" + user)) {
        alert("用户名已存在！");
        return;
    }

    // 保存账号（修复登录问题）
    localStorage.setItem("user_" + user, JSON.stringify({
        pw: pwd,
        mail: email
    }));

    alert("注册成功！现在去登录～");
    location.href = "login.html";
}
</script>

</body>
</html>
