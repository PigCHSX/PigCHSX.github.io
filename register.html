<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>注册</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:linear-gradient(135deg,#f8f9fc,#e2eafc);display:grid;place-items:center;height:100vh;padding:20px}
.logo{position:fixed;top:20px;left:20px}
.logo img{height:50px;border-radius:8px}
.box{background:#fff;width:100%;max-width:400px;padding:36px;border-radius:20px;box-shadow:0 10px 30px #00000010}
h2{text-align:center;margin-bottom:24px}
input{width:100%;padding:14px;margin-bottom:16px;border:1px solid #ddd;border-radius:12px}
button{width:100%;padding:14px;background:#007bff;color:white;border:none;border-radius:12px;font-weight:600}
.link{text-align:center;margin-top:12px;font-size:14px}
a{color:#007bff}
</style>
</head>
<body>
<div class="logo"><img src="logo.png"></div>
<div class="box">
<h2>注册</h2>
<input id="u" placeholder="账号">
<input id="m" placeholder="邮箱">
<input id="c" placeholder="验证码">
<button onclick="code()">获取验证码</button>
<input id="p" type="password" placeholder="密码">
<button onclick="reg()">注册</button>
<div class="link"><a href="login.html">返回登录</a></div>
</div>
<script>
let code;
function code(){code=Math.random().toFixed(6).slice(-6);alert('验证码：'+code)}
function reg(){
let u=document.getElementById('u').value,m=document.getElementById('m').value,c=document.getElementById('c').value,p=document.getElementById('p').value
if(c!==code)return alert('验证码错误')
if(localStorage.getItem('user_'+u))return alert('账号已存在')
localStorage.setItem('user_'+u,JSON.stringify({pw:p,mail:m}))
alert('注册成功！')
location.href='login.html'
}
</script>
</body>
</html>
