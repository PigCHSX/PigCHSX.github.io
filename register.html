<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册账号 - 水二杂记｜MOSE</title>
    <!-- 稳定版 Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .box h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #337ecc;
        }
        .link {
            text-align: center;
            margin-top: 15px;
        }
        .link a {
            color: #409eff;
            text-decoration: none;
            margin: 0 5px;
        }

        /* 可关闭的提示弹窗 */
        #accountTips {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .tipsContent {
            background: white;
            padding: 25px;
            border-radius: 10px;
            max-width: 320px;
            text-align: center;
            position: relative;
        }
        .closeTips {
            margin-top: 15px;
            padding: 8px 20px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- 可关闭的提示弹窗 -->
    <div id="accountTips">
        <div class="tipsContent">
            <p>注册后会发送验证邮件，请前往邮箱激活后再登录！</p>
            <button class="closeTips" onclick="closeTips()">我知道了</button>
        </div>
    </div>

    <!-- 注册表单 -->
    <div class="box">
        <h2>账号注册</h2>
        <input id="username" placeholder="设置用户名" type="text">
        <input id="email" placeholder="邮箱" type="email">
        <input id="password" placeholder="设置密码" type="password">
        <button id="registerBtn">完成注册</button>
        <div class="link">
            <a href="login.html">返回登录</a> | <a href="main.html">返回首页</a>
        </div>
    </div>

<script>
// ==================== 你的 Supabase 配置 ====================
const SUPABASE_URL = 'https://urecpftjcruwfcdwrcyj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_yLWqUQuZbmcsUwE5hwTv2A_wGe1mU0_';

// 检查 SDK 是否加载
if (!window.supabase) {
    alert('Supabase 加载失败，请检查网络！');
}

// 创建全局客户端
window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 打开提示
window.onload = function () {
    document.getElementById('accountTips').style.display = 'flex';
};

// 关闭提示弹窗
function closeTips() {
    document.getElementById('accountTips').style.display = 'none';
}

// ==================== 注册函数 ====================
window.doRegister = async function () {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !email || !password) {
        alert('请填写完整信息！');
        return;
    }

    try {
        const { data, error } = await window.supabaseClient.auth.signUp({
            email: email,
            password: password,
            options: {
                data: { username: username }
            }
        });

        if (error) throw error;

        alert('注册成功！请前往邮箱查收验证邮件，激活后登录。');
        location.href = 'login.html';

    } catch (err) {
        alert('注册失败：' + err.message);
        console.error('错误详情：', err);
    }
};

// 绑定按钮
document.getElementById('registerBtn').addEventListener('click', window.doRegister);
</script>

</body>
</html>
