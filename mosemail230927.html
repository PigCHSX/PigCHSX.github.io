<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>发信 - 水二杂记｜MOSE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f8f9fc;display:flex;flex-direction:column;min-height:100vh;padding:40px 20px}
.box{background:#fff;width:100%;max-width:600px;padding:36px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.06);margin:0 auto}
h2{text-align:center;margin-bottom:24px;color:#222}
input,textarea,select{width:100%;padding:14px;margin-bottom:16px;border:1px solid #ddd;border-radius:12px;font-size:15px}
textarea{min-height:160px;resize:vertical}
button{width:100%;padding:14px;background:#007bff;color:white;border:none;border-radius:12px;font-weight:600;font-size:16px;cursor:pointer}
button:disabled{background:#999;cursor:not-allowed}
.result{text-align:center;margin-top:16px;font-size:14px;color:#28a745}
.result.error{color:#dc3545}
.footer{margin-top:40px;text-align:center;font-size:13px;color:#666}
</style>
</head>
<body>
<div class="box">
    <h2>📧 用专属域名发信</h2>
    <select id="fromSelect">
        <option value="noreply" selected>《水二杂记》官方 &lt;mose@mose.cc.cd&gt;</option>
        <option value="pigli">沧海四象 &lt;pigli@mose.cc.cd&gt;</option>
    </select>
    <input id="to" type="email" placeholder="收件人邮箱（如 abcd@example.com）" required>
    <input id="subject" placeholder="邮件主题" required>
    <textarea id="content" placeholder="邮件正文..." required></textarea>
    <button id="sendBtn" onclick="sendEmail()">发送邮件</button>
    <div id="result"></div>
</div>
<div class="footer">水二杂记｜MOSE · 专属域名发信工具</div>
<script>
// 发件人身份映射
const senders = {
    noreply: { name: '《水二杂记》官方', email: 'mose@mose.cc.cd' },
    pigli: { name: '沧海四象', email: 'pigli@mose.cc.cd' }
};

async function sendEmail() {
    const fromSel = document.getElementById('fromSelect').value;
    const sender = senders[fromSel];
    const fromStr = `${sender.name} <${sender.email}>`;
    const to = document.getElementById('to').value.trim();
    const subject = document.getElementById('subject').value.trim();
    const content = document.getElementById('content').value.trim();
    const btn = document.getElementById('sendBtn');
    const result = document.getElementById('result');

    if (!to || !subject || !content) {
        result.textContent = '请填写完整信息';
        result.className = 'result error';
        return;
    }

    btn.disabled = true;
    btn.textContent = '发送中...';
    result.textContent = '';
    result.className = 'result';

    try {
        const res = await fetch('https://send.mose.cc.cd', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                from: fromStr,
                to: [to],
                subject: subject,
                html: `<p>${content.replace(/\n/g, '<br>')}</p>`
            })
        });
        const data = await res.json();
        if (data.id) {
            result.textContent = '✅ 邮件发送成功！';
            result.className = 'result';
        } else {
            result.textContent = '❌ 发送失败：' + (data.message || '未知错误');
            result.className = 'result error';
        }
    } catch (err) {
        result.textContent = '❌ 网络错误：' + err.message;
        result.className = 'result error';
    } finally {
        btn.disabled = false;
        btn.textContent = '发送邮件';
    }
}
</script>
</body>
</html>
