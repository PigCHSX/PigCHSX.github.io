<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>找回</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:linear-gradient(135deg,#f8f9fc,#e2eafc);display:grid;place-items:center;height:100vh;padding:20px}
.logo{position:fixed;top:20px;left:20px}
.logo img{height:50px;border-radius:8px}
.box{background:#fff;width:100%;max-width:400px;padding:36px;border-radius:20px;box-shadow:0 10px 30px #00000010}
h2{text-align:center;margin-bottom:24px}
input{width:100%;padding:14px;margin-bottom:16px;border:1px solid #ddd;border-radius:12px}
button{width:100%;padding:14px;background:#007bff;color:white;border:none;border-radius:12px}
.link{text-align:center;margin-top:12px}
a{color:#007bff}
</style>
</head>
<body>
<div class="logo"><img src="logo.png"></div>
<div class="box">
<h2>找回账号密码</h2>
<input id="m" placeholder="邮箱">
<button onclick="find()">查询</button>
<div class="link"><a href="login.html">返回登录</a></div>
</div>
<script>
function find(){
let m=document.getElementById('m').value
for(let i=0;i<localStorage.length;i++){
let k=localStorage.key(i)
if(!k.startsWith('user_'))continue
let d=JSON.parse(localStorage.getItem(k))
if(d.mail==m){alert('账号：'+k.replace('user_','')+'\n密码：'+d.pw);return}
}
alert('未找到')
}
</script>
</body>
</html>
