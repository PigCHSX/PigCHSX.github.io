<body>

<script>
const SUPABASE_URL = 'https://urecpftjcruwfcdwrcyj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_yLWqUQuZbmcsUwE5hwTv2A_wGe1mU0_';
window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;

async function checkLoginStatus() {
    const { data: { session } } = await window.supabaseClient.auth.getSession();
    if (!session) { alert('请先登录！'); location.href = 'login.html'; return; }
    const { data: { user } } = await window.supabaseClient.auth.getUser();
    currentUser = user;
    const username = user.user_metadata.username || user.email.split('@')[0];
    localStorage.setItem('sb_username', username);
    // 可以在页面某处显示用户名，这里省略，直接加载历史
    loadHistory();
}

async function loadHistory() {
    const container = document.getElementById('list');
    container.innerHTML = '<div style="text-align:center;padding:20px;">加载中...</div>';

    const userId = currentUser.id;

    const { data, error } = await window.supabaseClient
        .from('submissions')
        .select('*')
        .eq('user_id', userId)
        .order('created_at', { ascending: false });

    if (error) {
        container.innerHTML = `<div style="text-align:center;background:#fff;padding:20px;border-radius:16px">加载失败：${error.message}</div>`;
        return;
    }

    if (!data || data.length === 0) {
        container.innerHTML = '<div style="text-align:center;background:#fff;padding:20px;border-radius:16px">暂无投稿</div>';
        return;
    }

    let html = '';
    data.forEach(item => {
        const time = item.created_at ? new Date(item.created_at).toLocaleString() : '';
        html += `<div class="item">
            <div class="title">${escapeHtml(item.title)}</div>
            <div>${escapeHtml(item.content.slice(0, 60))}...</div>
            <div class="info">${time}｜${item.status || '未读'}</div>
        </div>`;
    });
    container.innerHTML = html;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function doLogout() {
    if (!confirm('确定要退出登录吗？')) return;
    await window.supabaseClient.auth.signOut();
    localStorage.removeItem('sb_username');
    alert('已退出登录！');
    location.href = 'login.html';
}

window.onload = checkLoginStatus;
</script>
</body>
</html>
