<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>我的投稿 - 水二杂记|MOSE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:linear-gradient(135deg,#f8f9fc,#e2eafc);padding:100px 20px;max-width:700px;margin:0 auto}
.logo{position:fixed;top:20px;left:20px}
.logo img{height:50px;border-radius:8px}
.user{position:fixed;top:20px;right:20px;background:#fff;padding:10px 14px;border-radius:12px}
.item{background:#fff;padding:20px;border-radius:16px;margin-bottom:12px}
.title{font-weight:600;margin-bottom:8px}
.info{font-size:12px;color:#666}
.back{text-align:center;margin-top:20px}
a{color:#007bff}
.logout-btn{
    position:fixed;top:20px;right:180px;background:#dc3545;color:#fff;padding:10px 14px;border-radius:12px;border:none;cursor:pointer;
}
</style>
</head>
<body>
<div class="logo"><img src="logo.png"></div>
<button class="logout-btn" onclick="doLogout()">退出登录</button>
<div class="user" id="user"></div>
<div id="list"></div>
<div class="back"><a href="submit.html">返回投稿</a></div>

<script>
const SUPABASE_URL = 'https://urecpftjcruwfcdwrcyj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_yLWqUQuZbmcsUwE5hwTv2A_wGe1mU0_';
window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function checkLoginStatus() {
    const { data: { session } } = await window.supabaseClient.auth.getSession();
    if (!session) {
        alert('请先登录！');
        location.href = 'login.html';
        return;
    }
    const { data: { user } } = await window.supabaseClient.auth.getUser();
    // ✅ 核心修改：显示用户名
    const username = user.user_metadata.username || user.email.split('@')[0];
    localStorage.setItem('sb_username', username);
    document.getElementById('user').innerText = '用户：' + username;
    loadHistory(username);
}

function loadHistory(user) {
    let list=JSON.parse(localStorage.getItem('list_'+user)||'[]')
    let html=''
    list.reverse().forEach(i=>{
        html+=`<div class="item"><div class="title">${i.title}</div><div>${i.content.slice(0,60)}...</div><div class="info">${i.time}｜投稿成功</div></div>`
    })
    document.getElementById('list').innerHTML=html||'<div style="text-align:center;background:#fff;padding:20px;border-radius:16px">暂无投稿</div>'
}

async function doLogout() {
    if (!confirm('确定要退出登录吗？')) return;
    await window.supabaseClient.auth.signOut();
    localStorage.removeItem('sb_username');
    alert('已退出登录！');
    location.href = 'login.html';
}

window.onload = checkLoginStatus;
</script>
</body>
</html>
