<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板 - 水二杂记｜MOSE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
    <style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:linear-gradient(135deg,#f8f9fc,#e2eafc);padding:40px 20px 280px;max-width:700px;margin:0 auto}
.nav{background:#fff;padding:18px 20px;border-radius:16px;box-shadow:0 4px 16px #00000006;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.nav-links a{margin:0 12px;font-size:16px;color:#222;text-decoration:none;padding:6px 8px}
.nav-links a.active{color:#007bff;font-weight:600}
.logout-btn{
    background:#dc3545;
    color:white;
    border:none;
    padding:8px 16px !important;
    border-radius:8px !important;
    cursor:pointer;
    font-size:14px !important;
    width: auto !important;
    font-weight: normal !important;
}
.logout-btn:hover{background:#c82333;}
.box{background:#fff;padding:36px;border-radius:20px;box-shadow:0 10px 30px #00000010;}
h2{margin-bottom:24px;text-align:center;color:#222}
input,textarea{width:100%;padding:14px;margin-bottom:16px;border:1px solid #ddd;border-radius:12px;font-size:15px}
textarea{min-height:200px;resize:vertical}
.tips-btn{padding:8px 16px;background:#f5f5f5;color:#007bff;border:1px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer;margin-bottom:10px}
.tips-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;z-index:999}
.tips-content{background:#fff;padding:20px;border-radius:12px;max-width:500px;width:90%}
.tips-close{margin-top:15px;padding:8px 16px;background:#007bff;color:#fff;border:none;border-radius:8px;cursor:pointer}
button{width:100%;padding:14px;background:#007bff;color:white;border:none;border-radius:12px;font-weight:600;font-size:16px;cursor:pointer}
.link{text-align:center;margin-top:20px}
a{color:#007bff;text-decoration:none}
.footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:20px;text-align:center}
.footer p{font-size:14px;margin:4px 0;color:#333}
.qrcodes{display:flex;gap:10px;justify-content:center;margin-top:10px}
.qrcodes img{width:70px;height:70px;border-radius:6px}
.user-info{text-align:right;margin-bottom:16px;color:#666;font-size:14px}

/* ========== 移动端适配 ========== */
@media (max-width: 600px) {
    .nav {
        flex-direction: column;
        align-items: stretch;
    }
    .nav-links {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 5px;
    }
    .nav-links a {
        margin: 0 6px;
        font-size: 15px;
        padding: 4px 6px;
    }
    .logout-btn {
        align-self: center;
        margin-top: 5px;
        padding: 6px 14px !important;
    }
    body {
        padding-top: 20px;
        padding-bottom: 300px;
    }
    .box {
        padding: 24px;
    }
}
</style>
</head>
<body>

<div class="nav">
    <div class="nav-links">
        <a href="main.html">首页</a>
        <a href="read.html">阅读</a>
        <a href="login.html">投稿</a>
        <a href="messages.html" class="active">留言</a>
    </div>
    <button class="logout-btn" onclick="doLogout()">退出登录</button>
</div>

<div class="container">
    <div class="message-form">
        <h3 style="margin-bottom:16px;">💬 发表留言</h3>
        <textarea id="messageContent" placeholder="写下你想说的话..."></textarea>
        <input id="messagePicUrl" placeholder="图片链接（可选，请先上传至图床）">
        <button onclick="postMessage()">发布留言</button>
        <p style="font-size:12px;color:#888;margin-top:8px;">支持图片直链，推荐图床：<a href="https://imgchr.com/" target="_blank">路过图床</a>、<a href="https://sm.ms/" target="_blank">SM.MS</a></p>
    </div>

    <div class="message-list">
        <h3 style="margin-bottom:20px;">📝 留言列表</h3>
        <div id="messageContainer">
            <div class="loading">加载中...</div>
        </div>
    </div>
</div>

<div class="footer">
    读者联盟QQ频道：MOSE20230927 | 投稿人联盟QQ群：1054707527<br>
    官微：gh_1ece4d40dedf | 邮箱：pigli@mose.cc.cd
</div>

<script>
const SUPABASE_URL = 'https://urecpftjcruwfcdwrcyj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_yLWqUQuZbmcsUwE5hwTv2A_wGe1mU0_';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;

// 检查登录状态
async function checkAuth() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
        alert('请先登录后再访问留言板！');
        location.href = 'login.html';
        return false;
    }
    const { data: { user } } = await supabase.auth.getUser();
    currentUser = user;
    return true;
}

// 退出登录
async function doLogout() {
    if (!confirm('确定要退出登录吗？')) return;
    await supabase.auth.signOut();
    localStorage.removeItem('sb_username');
    alert('已退出登录！');
    location.href = 'login.html';
}

// 发布留言
async function postMessage() {
    if (!currentUser) { alert('请先登录'); return; }
    const content = document.getElementById('messageContent').value.trim();
    const picUrl = document.getElementById('messagePicUrl').value.trim();
    if (!content) { alert('留言内容不能为空'); return; }

    const username = currentUser.user_metadata.username || currentUser.email.split('@')[0];
    const userId = currentUser.id;

    const insertData = {
        username: username,
        content: content,
        pic_url: picUrl || null
    };
    // 如果表有 user_id 字段则加上
    if (await hasColumn('messages', 'user_id')) {
        insertData.user_id = userId;
    }

    const { error } = await supabase.from('messages').insert([insertData]);
    if (error) {
        alert('发布失败：' + error.message);
    } else {
        document.getElementById('messageContent').value = '';
        document.getElementById('messagePicUrl').value = '';
        loadMessages();
    }
}

// 检测表是否有某字段
async function hasColumn(table, column) {
    try {
        const { data, error } = await supabase.from(table).select(column).limit(1);
        return !error;
    } catch { return false; }
}

// 加载留言列表
async function loadMessages() {
    const container = document.getElementById('messageContainer');
    container.innerHTML = '<div class="loading">加载中...</div>';
    
    let query = supabase.from('messages').select('*').order('created_at', { ascending: false });
    const { data, error } = await query;
    if (error) {
        container.innerHTML = '<div class="loading">加载失败：' + error.message + '</div>';
        return;
    }
    if (!data || data.length === 0) {
        container.innerHTML = '<div class="loading">暂无留言，快来抢沙发吧！</div>';
        return;
    }
    
    let html = '';
    data.forEach(msg => {
        const time = msg.created_at ? new Date(msg.created_at).toLocaleString() : '';
        html += `<div class="message-item">
            <div class="message-header">
                <span class="message-user">${escapeHtml(msg.username) || '匿名'}</span>
                <span class="message-time">${time}</span>
            </div>
            <div class="message-content">${escapeHtml(msg.content).replace(/\n/g, '<br>')}</div>`;
        if (msg.pic_url) {
            html += `<div class="message-pic"><img src="${escapeHtml(msg.pic_url)}" alt="留言图片" loading="lazy"></div>`;
        }
        html += `</div>`;
    });
    container.innerHTML = html;
}

// 简单的转义防XSS
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 初始化
window.onload = async () => {
    const ok = await checkAuth();
    if (ok) loadMessages();
};
</script>
</body>
</html>
